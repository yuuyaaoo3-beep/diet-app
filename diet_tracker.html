<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="体重・食事管理">
<title>体重・食事管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#efefed;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --blue:#1d6fcc;--blue-bg:#e8f0fb;
  --red:#c0392b;--red-bg:#fdf0ef;
  --green:#2d7a2d;--green-bg:#edf7ed;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
    --blue:#4da3ff;--blue-bg:#1c2e45;
    --red:#ff6b6b;--red-bg:#3a1e1e;
    --green:#5ec95e;--green-bg:#1a2e1a;
  }
}
html,body{height:100%;background:var(--bg3);font-family:-apple-system,'Helvetica Neue',sans-serif}
.app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative}

/* Header */
.header{padding:12px 16px 10px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10}
.header-title{font-size:17px;font-weight:600;color:var(--text)}
.header-btn{font-size:15px;color:var(--blue);background:none;border:none;cursor:pointer;padding:4px 8px;font-weight:500}

/* Tabs */
.tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:49px;z-index:10}
.tab{flex:1;padding:10px 2px;font-size:11px;text-align:center;cursor:pointer;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;font-weight:500;letter-spacing:0.3px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}

/* Content */
.content{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}

/* Cards */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px}

/* Form elements */
.label{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
input[type=date],input[type=number],input[type=text],select{
  width:100%;padding:10px 12px;border:0.5px solid var(--border2);
  border-radius:var(--radius);font-size:16px;background:var(--bg2);
  color:var(--text);-webkit-appearance:none;appearance:none;
}
input:focus,select:focus{outline:none;border-color:var(--blue);background:var(--bg);box-shadow:0 0 0 3px rgba(29,111,204,0.15)}
.form-gap{margin-bottom:10px}

/* Buttons */
.btn{width:100%;padding:12px;border-radius:var(--radius);font-size:15px;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);transition:all .15s;text-align:center}
.btn:active{opacity:0.7;transform:scale(0.98)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-sm{width:auto;padding:6px 12px;font-size:13px}
.btn-danger{color:var(--red);border-color:rgba(192,57,43,0.3);background:var(--red-bg)}

/* Grids */
.pfc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pfc-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}

/* Metric cards */
.metric-card{background:var(--bg2);border-radius:var(--radius);padding:10px 6px;text-align:center}
.metric-val{font-size:17px;font-weight:600;color:var(--text)}
.metric-label{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500}

/* Diff colors */
.diff-pos{color:var(--blue);font-weight:600}
.diff-neg{color:var(--red);font-weight:600}

/* Food items */
.food-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border)}
.food-item:last-child{border-bottom:none}
.food-name{font-size:14px;font-weight:500;color:var(--text)}
.food-pfc{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.5}

/* Category header */
.cat-header{font-size:13px;font-weight:600;color:var(--text2);margin:14px 0 6px;display:flex;align-items:center;justify-content:space-between;padding:0 2px}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--bg3);color:var(--text2);font-weight:500}

/* Period buttons */
.period-btns{display:flex;gap:6px;margin-bottom:14px}
.period-btn{padding:7px 14px;font-size:13px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);border-radius:99px;cursor:pointer;font-weight:500;white-space:nowrap}
.period-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* Bottom sheet */
.sub-nav{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.sub-nav.show{display:flex}
.sub-sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:480px}
.sub-sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.sub-sheet-title{font-size:17px;font-weight:600;margin-bottom:16px;color:var(--text)}

/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.show{display:flex}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px;color:var(--text)}

/* List items */
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.list-item:last-child{border-bottom:none}
.list-item:active{opacity:0.6}
.list-name{font-size:15px;color:var(--text);font-weight:500}
.list-sub{font-size:11px;color:var(--text2);margin-top:2px}
.list-arrow{color:var(--text3);font-size:14px}

/* Progress */
.progress-row{margin-bottom:12px}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--text2)}
.progress-bar-wrap{background:var(--bg3);border-radius:99px;height:7px;overflow:hidden}
.progress-bar{height:7px;border-radius:99px;background:var(--blue);transition:width .4s}
.progress-bar.over{background:var(--red)}

/* Total row */
.total-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;color:var(--text)}
.total-row.sum{font-weight:600;border-top:0.5px solid var(--border);padding-top:10px;margin-top:4px}

/* Donut grid */
.donut-grid{display:flex;flex-direction:row;gap:0;margin-bottom:10px;width:100%;overflow:hidden}
.donut-col{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center}
.donut-wrap{position:relative;width:100%;height:120px}
.donut-label{font-size:11px;color:var(--text2);text-align:center;margin-bottom:4px;font-weight:500}

/* Chart wrap */
.chart-wrap{position:relative;width:100%;height:220px}

/* Empty state */
.empty{text-align:center;color:var(--text3);font-size:14px;padding:28px 0}

/* Divider */
.divider{height:0.5px;background:var(--border);margin:12px 0}

/* Row layout */
.row{display:flex;gap:8px;align-items:center}
.flex-1{flex:1}

/* Section spacing */
.section-gap{margin-bottom:8px}

/* Search */
.search-wrap{margin-bottom:12px}

/* Weight history item */
.weight-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border)}
.weight-item:last-child{border-bottom:none}
.weight-date{font-size:14px;font-weight:500;color:var(--text)}
.weight-val{font-size:20px;font-weight:600;color:var(--text)}
.weight-unit{font-size:13px;color:var(--text2);margin-left:2px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">体重・食事管理</div>
    <button class="header-btn" onclick="showSubMenu()">設定</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab(0)">体重</button>
    <button class="tab" onclick="switchTab(1)">グラフ</button>
    <button class="tab" onclick="switchTab(2)">食事記録</button>
    <button class="tab" onclick="switchTab(3)">集計</button>
  </div>
  <div class="content" id="main-content"></div>
</div>

<!-- サブメニュー -->
<div class="sub-nav" id="sub-nav" onclick="if(event.target===this)closeSubMenu()">
  <div class="sub-sheet">
    <div class="sub-sheet-handle"></div>
    <div class="sub-sheet-title">設定</div>
    <button class="btn" style="margin-bottom:10px" onclick="closeSubMenu();openGoal()">目標管理（PFC・kcal）</button>
    <button class="btn" style="margin-bottom:10px" onclick="closeSubMenu();openMaster()">食事マスタ管理</button>
    <button class="btn" style="margin-bottom:10px" onclick="exportData()">データエクスポート（JSON）</button>
    <label class="btn" style="display:block;text-align:center;cursor:pointer;margin-bottom:10px">
      データインポート（JSON）
      <input type="file" accept=".json" style="display:none" onchange="importData(event)">
    </label>
    <button class="btn" onclick="closeSubMenu()">閉じる</button>
  </div>
</div>

<!-- 目標管理モーダル -->
<div class="modal-overlay" id="goal-modal" onclick="if(event.target===this)closeGoal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">目標管理</div>
    <div class="label form-gap">たんぱく質 P (g)</div>
    <input type="number" step="0.1" id="g-protein" class="form-gap" placeholder="例: 150.0">
    <div class="label form-gap" style="margin-top:8px">脂質 F (g)</div>
    <input type="number" step="0.1" id="g-fat" class="form-gap" placeholder="例: 50.0">
    <div class="label form-gap" style="margin-top:8px">炭水化物 C (g)</div>
    <input type="number" step="0.1" id="g-carb" class="form-gap" placeholder="例: 200.0">
    <div class="label form-gap" style="margin-top:8px">カロリー (kcal)</div>
    <input type="number" step="0.1" id="g-kcal" class="form-gap" placeholder="例: 2000.0" style="margin-bottom:16px">
    <div class="row">
      <button class="btn flex-1" onclick="closeGoal()">キャンセル</button>
      <button class="btn btn-primary flex-1" onclick="saveGoal()">保存</button>
    </div>
  </div>
</div>

<!-- 食事マスタ管理モーダル -->
<div class="modal-overlay" id="master-modal" onclick="if(event.target===this)closeMaster()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">食事マスタ管理</div>
    <div id="master-list"></div>
    <button class="btn btn-primary" style="margin-top:14px" onclick="openAddMaster()">＋ 食事を追加</button>
    <button class="btn" style="margin-top:8px" onclick="closeMaster()">閉じる</button>
  </div>
</div>

<!-- 食事マスタ追加/編集モーダル -->
<div class="modal-overlay" id="master-edit-modal" onclick="if(event.target===this)closeMasterEdit()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="master-edit-title">食事を追加</div>
    <input type="hidden" id="me-index" value="-1">
    <div class="label form-gap">食事名</div>
    <input type="text" id="me-name" placeholder="例: 鶏むね肉100g" style="margin-bottom:12px">
    <div class="pfc-grid" style="margin-bottom:16px">
      <div><div class="label form-gap">P (g)</div><input type="number" step="0.1" id="me-p" placeholder="0.0"></div>
      <div><div class="label form-gap">F (g)</div><input type="number" step="0.1" id="me-f" placeholder="0.0"></div>
      <div><div class="label form-gap" style="margin-top:8px">C (g)</div><input type="number" step="0.1" id="me-c" placeholder="0.0"></div>
      <div><div class="label form-gap" style="margin-top:8px">kcal</div><input type="number" step="0.1" id="me-kcal" placeholder="0.0"></div>
    </div>
    <div class="row">
      <button class="btn flex-1" onclick="closeMasterEdit()">キャンセル</button>
      <button class="btn btn-primary flex-1" onclick="saveMaster()">保存</button>
    </div>
  </div>
</div>

<!-- 食事選択モーダル -->
<div class="modal-overlay" id="food-select-modal" onclick="if(event.target===this)closeFoodSelect()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">食事を選択</div>
    <div class="search-wrap">
      <input type="text" id="food-search" placeholder="🔍 検索..." oninput="renderFoodSelect()">
    </div>
    <div id="food-select-list"></div>
    <button class="btn" style="margin-top:14px" onclick="closeFoodSelect()">閉じる</button>
  </div>
</div>

<!-- 手入力/編集モーダル -->
<div class="modal-overlay" id="manual-modal" onclick="if(event.target===this)closeManual()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="manual-title">手入力</div>
    <input type="hidden" id="manual-edit-id">
    <div class="label form-gap">食事名</div>
    <input type="text" id="m-name" placeholder="食事名を入力" style="margin-bottom:12px">
    <div class="pfc-grid" style="margin-bottom:16px">
      <div><div class="label form-gap">P (g)</div><input type="number" step="0.1" id="m-p" placeholder="0.0"></div>
      <div><div class="label form-gap">F (g)</div><input type="number" step="0.1" id="m-f" placeholder="0.0"></div>
      <div><div class="label form-gap" style="margin-top:8px">C (g)</div><input type="number" step="0.1" id="m-c" placeholder="0.0"></div>
      <div><div class="label form-gap" style="margin-top:8px">kcal</div><input type="number" step="0.1" id="m-kcal" placeholder="0.0"></div>
    </div>
    <div class="row">
      <button class="btn flex-1" onclick="closeManual()">キャンセル</button>
      <button class="btn btn-primary flex-1" onclick="saveManualFood()">保存</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const S={
  get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};

let state={
  weights:S.get('weights')||{},
  meals:S.get('meals')||{},
  master:S.get('master')||[],
  goal:S.get('goal')||{p:150,f:50,c:200,kcal:2000},
  currentTab:0,
  mealDate:todayStr(),
  summaryDate:todayStr(),
  pendingCat:'morning'
};

function todayStr(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){const p=d.split('-');return `${p[0]}年${p[1]}月${p[2]}日`}
function fmt(v){return parseFloat(v||0).toFixed(1)}

function save(){
  S.set('weights',state.weights);
  S.set('meals',state.meals);
  S.set('master',state.master);
  S.set('goal',state.goal);
}

let weightChartInst=null;
let donutCharts={};

function switchTab(i){
  state.currentTab=i;
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  if(weightChartInst){weightChartInst.destroy();weightChartInst=null;}
  Object.values(donutCharts).forEach(c=>c.destroy());
  donutCharts={};
  render();
}

function render(){
  const el=document.getElementById('main-content');
  if(state.currentTab===0) el.innerHTML=renderWeightTab();
  else if(state.currentTab===1) el.innerHTML=renderGraphTab();
  else if(state.currentTab===2) el.innerHTML=renderMealTab();
  else el.innerHTML=renderSummaryTab();
  if(state.currentTab===1) setTimeout(drawWeightChart,50);
  if(state.currentTab===3) setTimeout(drawDonutCharts,50);
}

/* ── TAB 1: 体重記録 ── */
function renderWeightTab(){
  const today=todayStr();
  const entries=Object.entries(state.weights).sort((a,b)=>b[0].localeCompare(a[0]));
  return `
    <div class="card">
      <div class="card-title">体重を記録する</div>
      <div class="label form-gap">日付</div>
      <input type="date" id="w-date" value="${today}" max="${today}" style="margin-bottom:12px">
      <div class="label form-gap">体重 (kg)</div>
      <input type="number" step="0.1" id="w-val" placeholder="例: 65.5" style="margin-bottom:16px" inputmode="decimal">
      <button class="btn btn-primary" onclick="saveWeight()">記録する</button>
    </div>
    <div class="card">
      <div class="card-title">記録一覧</div>
      ${entries.length===0?'<div class="empty">まだ記録がありません</div>':entries.map(([d,v])=>`
        <div class="weight-item">
          <div>
            <div class="weight-date">${fmtDate(d)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span><span class="weight-val">${fmt(v)}</span><span class="weight-unit">kg</span></span>
            <button class="btn btn-sm btn-danger" onclick="deleteWeight('${d}')">削除</button>
          </div>
        </div>`).join('')}
    </div>`;
}

function saveWeight(){
  const d=document.getElementById('w-date').value;
  const v=parseFloat(document.getElementById('w-val').value);
  if(!d||isNaN(v)){alert('日付と体重を入力してください');return;}
  state.weights[d]=v;
  save();render();
}

function deleteWeight(d){
  if(!confirm(`${fmtDate(d)} の記録を削除しますか？`))return;
  delete state.weights[d];
  save();render();
}

/* ── TAB 2: グラフ ── */
let graphPeriod='all';
function renderGraphTab(){
  return `
    <div class="card">
      <div class="card-title">体重推移グラフ</div>
      <div class="period-btns">
        <button class="period-btn ${graphPeriod==='1m'?'active':''}" onclick="setGraphPeriod('1m')">1ヶ月</button>
        <button class="period-btn ${graphPeriod==='6m'?'active':''}" onclick="setGraphPeriod('6m')">半年</button>
        <button class="period-btn ${graphPeriod==='1y'?'active':''}" onclick="setGraphPeriod('1y')">1年</button>
        <button class="period-btn ${graphPeriod==='all'?'active':''}" onclick="setGraphPeriod('all')">全期間</button>
      </div>
      <div class="chart-wrap"><canvas id="weightChart" role="img" aria-label="体重推移グラフ">体重推移データ</canvas></div>
    </div>`;
}

function setGraphPeriod(p){
  graphPeriod=p;
  if(weightChartInst){weightChartInst.destroy();weightChartInst=null;}
  render();
}

function drawWeightChart(){
  const ctx=document.getElementById('weightChart');
  if(!ctx)return;
  const now=new Date();
  let entries=Object.entries(state.weights).sort((a,b)=>a[0].localeCompare(b[0]));
  if(graphPeriod!=='all'){
    const days=graphPeriod==='1m'?30:graphPeriod==='6m'?180:365;
    const cutoff=new Date(now-days*86400000).toISOString().slice(0,10);
    entries=entries.filter(([d])=>d>=cutoff);
  }
  if(!entries.length){ctx.parentElement.innerHTML='<div class="empty">この期間の記録がありません</div>';return;}
  const labels=entries.map(([d])=>d.slice(5).replace('-','/'));
  const data=entries.map(([,v])=>v);
  const minV=Math.min(...data)-1.5;
  const maxV=Math.max(...data)+1.5;
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  const gridColor=isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';
  const tickColor=isDark?'#8e8e93':'#6b6b6b';
  weightChartInst=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{
      label:'体重(kg)',data,
      borderColor:'#1d6fcc',
      backgroundColor:isDark?'rgba(29,111,204,0.12)':'rgba(29,111,204,0.08)',
      tension:0.3,pointRadius:4,pointBackgroundColor:'#1d6fcc',
      pointBorderColor:'#fff',pointBorderWidth:2,fill:true
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{min:minV,max:maxV,
          ticks:{callback:v=>v.toFixed(1)+'kg',color:tickColor,font:{size:11}},
          grid:{color:gridColor}},
        x:{ticks:{color:tickColor,font:{size:11},maxRotation:45,autoSkip:entries.length>15},
          grid:{display:false}}
      }
    }
  });
}

/* ── TAB 3: 食事記録 ── */
const CATS=[{id:'morning',label:'朝食'},{id:'lunch',label:'昼食'},{id:'dinner',label:'夕食'},{id:'snack',label:'間食'}];

function renderMealTab(){
  const meals=state.meals[state.mealDate]||{};
  return `
    <div class="card" style="margin-bottom:12px">
      <div class="label form-gap">日付</div>
      <input type="date" id="meal-date" value="${state.mealDate}" max="${todayStr()}" onchange="setMealDate(this.value)">
    </div>
    ${CATS.map(cat=>{
      const items=meals[cat.id]||[];
      return `
        <div class="cat-header">
          <span>${cat.label}</span>
          <span class="badge">${items.length}品</span>
        </div>
        <div class="card" style="padding:10px 14px">
          ${items.length===0?'<div style="font-size:13px;color:var(--text3);padding:4px 0">まだ記録がありません</div>':''}
          ${items.map((item,idx)=>`
            <div class="food-item">
              <div style="flex:1;min-width:0">
                <div class="food-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.name}</div>
                <div class="food-pfc">P: ${fmt(item.p)}g ／ F: ${fmt(item.f)}g ／ C: ${fmt(item.c)}g ／ ${fmt(item.kcal)}kcal</div>
              </div>
              <div style="display:flex;gap:6px;margin-left:8px;flex-shrink:0">
                <button class="btn btn-sm" onclick="editMealItem('${cat.id}',${idx})">編集</button>
                <button class="btn btn-sm btn-danger" onclick="deleteMealItem('${cat.id}',${idx})">削除</button>
              </div>
            </div>`).join('')}
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn btn-sm flex-1" onclick="openFoodSelect('${cat.id}')">マスタから追加</button>
            <button class="btn btn-sm flex-1" onclick="openManual('${cat.id}')">手入力</button>
          </div>
        </div>`;
    }).join('')}`;
}

function setMealDate(d){state.mealDate=d;render();}

function deleteMealItem(cat,idx){
  if(!confirm('この記録を削除しますか？'))return;
  state.meals[state.mealDate][cat].splice(idx,1);
  save();render();
}

function editMealItem(cat,idx){
  const item=state.meals[state.mealDate][cat][idx];
  document.getElementById('manual-title').textContent='食事を編集';
  document.getElementById('manual-edit-id').value=`${cat}__${idx}`;
  document.getElementById('m-name').value=item.name;
  document.getElementById('m-p').value=item.p;
  document.getElementById('m-f').value=item.f;
  document.getElementById('m-c').value=item.c;
  document.getElementById('m-kcal').value=item.kcal;
  document.getElementById('manual-modal').classList.add('show');
}

/* ── TAB 4: 集計 ── */
function renderSummaryTab(){
  const meals=state.meals[state.summaryDate]||{};
  const g=state.goal;
  let totP=0,totF=0,totC=0,totK=0;
  CATS.forEach(cat=>(meals[cat.id]||[]).forEach(i=>{
    totP+=parseFloat(i.p)||0;totF+=parseFloat(i.f)||0;
    totC+=parseFloat(i.c)||0;totK+=parseFloat(i.kcal)||0;
  }));
  const pct=(v,t)=>Math.min(100,Math.round(v/Math.max(t,0.01)*100));
  const diffTxt=(v,unit)=>{
    const d=v-parseFloat(g[unit==='kcal'?'kcal':unit.toLowerCase()]||0);
    const cl=d>=0?'diff-neg':'diff-pos';
    const sign=d>=0?'+':'';
    return `<span class="${cl}">${sign}${fmt(d)}${unit}</span>`;
  };
  const items4=[
    {label:'P（たんぱく質）',actual:totP,target:g.p,unit:'g'},
    {label:'F（脂質）',actual:totF,target:g.f,unit:'g'},
    {label:'C（炭水化物）',actual:totC,target:g.c,unit:'g'},
    {label:'カロリー',actual:totK,target:g.kcal,unit:'kcal'}
  ];

  let catBreakdown='';
  CATS.forEach(cat=>{
    const citems=meals[cat.id]||[];
    if(!citems.length)return;
    let cP=0,cF=0,cC=0,cK=0;
    citems.forEach(i=>{cP+=parseFloat(i.p)||0;cF+=parseFloat(i.f)||0;cC+=parseFloat(i.c)||0;cK+=parseFloat(i.kcal)||0;});
    catBreakdown+=`
      <div style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px">${cat.label}</div>
        ${citems.map(i=>`<div class="total-row"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.name}</span><span style="font-size:11px;color:var(--text2);margin-left:8px;flex-shrink:0">P:${fmt(i.p)} F:${fmt(i.f)} C:${fmt(i.c)} / ${fmt(i.kcal)}kcal</span></div>`).join('')}
        <div class="total-row sum"><span>小計</span><span style="font-size:12px">P:${fmt(cP)}g / F:${fmt(cF)}g / C:${fmt(cC)}g / ${fmt(cK)}kcal</span></div>
      </div>`;
  });

  return `
    <div class="card" style="margin-bottom:12px">
      <div class="label form-gap">日付</div>
      <input type="date" id="sum-date" value="${state.summaryDate}" max="${todayStr()}" onchange="setSumDate(this.value)">
    </div>
    <div class="card">
      <div class="card-title">合計摂取量</div>
      <div class="pfc-grid-4" style="margin-bottom:16px">
        <div class="metric-card"><div class="metric-val">${fmt(totP)}</div><div class="metric-label">P (g)</div></div>
        <div class="metric-card"><div class="metric-val">${fmt(totF)}</div><div class="metric-label">F (g)</div></div>
        <div class="metric-card"><div class="metric-val">${fmt(totC)}</div><div class="metric-label">C (g)</div></div>
        <div class="metric-card"><div class="metric-val" style="font-size:14px">${fmt(totK)}</div><div class="metric-label">kcal</div></div>
      </div>
      ${items4.map(({label,actual,target,unit})=>{
        const p=pct(actual,target);
        const diff=actual-target;
        const cl=diff>=0?'diff-neg':'diff-pos';
        const sign=diff>=0?'+':'';
        return `<div class="progress-row">
          <div class="progress-meta">
            <span>${label}</span>
            <span>${fmt(actual)} / ${fmt(target)}${unit} <span class="${cl}">${sign}${fmt(diff)}${unit}</span></span>
          </div>
          <div class="progress-bar-wrap"><div class="progress-bar ${p>=100?'over':''}" style="width:${p}%"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="card-title">PFCバランス（目標 vs 実績）</div>
      <div class="donut-grid">
        <div class="donut-col">
          <div class="donut-label">目標</div>
          <div class="donut-wrap"><canvas id="donut-goal" role="img" aria-label="目標PFCバランス">P:${g.p}g F:${g.f}g C:${g.c}g</canvas></div>
        </div>
        <div class="donut-col">
          <div class="donut-label">実績</div>
          <div class="donut-wrap"><canvas id="donut-actual" role="img" aria-label="実績PFCバランス">P:${fmt(totP)}g F:${fmt(totF)}g C:${fmt(totC)}g</canvas></div>
        </div>
      </div>
      <div style="display:flex;justify-content:center;gap:16px;font-size:11px;color:var(--text2)">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#1d6fcc;display:inline-block"></span>P</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#c0392b;display:inline-block"></span>F</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#2d7a2d;display:inline-block"></span>C</span>
      </div>
    </div>
    ${catBreakdown?`<div class="card"><div class="card-title">カテゴリ別内訳</div>${catBreakdown}</div>`:''}`;
}

function setSumDate(d){
  state.summaryDate=d;
  Object.values(donutCharts).forEach(c=>c.destroy());
  donutCharts={};
  render();
}

function drawDonutCharts(){
  const g=state.goal;
  const meals=state.meals[state.summaryDate]||{};
  let totP=0,totF=0,totC=0;
  CATS.forEach(cat=>(meals[cat.id]||[]).forEach(i=>{
    totP+=parseFloat(i.p)||0;totF+=parseFloat(i.f)||0;totC+=parseFloat(i.c)||0;
  }));
  const colors=['#1d6fcc','#c0392b','#2d7a2d'];
  const opts={responsive:true,maintainAspectRatio:false,layout:{padding:{top:4,bottom:4,left:4,right:4}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${parseFloat(ctx.parsed).toFixed(1)}g`}}},cutout:'55%'};
  ['donut-goal','donut-actual'].forEach(id=>{
    const ctx=document.getElementById(id);
    if(!ctx)return;
    const isGoal=id==='donut-goal';
    const d=isGoal?[g.p,g.f,g.c]:[totP,totF,totC];
    const total=d.reduce((a,b)=>a+(parseFloat(b)||0),0);
    donutCharts[id]=new Chart(ctx,{
      type:'doughnut',
      data:{labels:['P','F','C'],datasets:[{data:total>0?d:[1,1,1],backgroundColor:total>0?colors:['#ccc','#bbb','#aaa'],borderWidth:0}]},
      options:opts
    });
  });
}

/* ── マスタ ── */
function openMaster(){renderMasterList();document.getElementById('master-modal').classList.add('show');}
function closeMaster(){document.getElementById('master-modal').classList.remove('show');}

function renderMasterList(){
  const el=document.getElementById('master-list');
  if(!state.master.length){el.innerHTML='<div class="empty">マスタが空です<br>下のボタンから追加してください</div>';return;}
  el.innerHTML=state.master.map((m,i)=>`
    <div class="food-item">
      <div style="flex:1;min-width:0">
        <div class="food-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.name}</div>
        <div class="food-pfc">P: ${fmt(m.p)}g ／ F: ${fmt(m.f)}g ／ C: ${fmt(m.c)}g ／ ${fmt(m.kcal)}kcal</div>
      </div>
      <div style="display:flex;gap:6px;margin-left:8px;flex-shrink:0">
        <button class="btn btn-sm" onclick="openEditMaster(${i})">編集</button>
        <button class="btn btn-sm btn-danger" onclick="deleteMasterItem(${i})">削除</button>
      </div>
    </div>`).join('');
}

function openAddMaster(){
  document.getElementById('master-edit-title').textContent='食事を追加';
  document.getElementById('me-index').value='-1';
  ['me-name','me-p','me-f','me-c','me-kcal'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('master-edit-modal').classList.add('show');
}

function openEditMaster(i){
  const m=state.master[i];
  document.getElementById('master-edit-title').textContent='食事を編集';
  document.getElementById('me-index').value=i;
  document.getElementById('me-name').value=m.name;
  document.getElementById('me-p').value=m.p;
  document.getElementById('me-f').value=m.f;
  document.getElementById('me-c').value=m.c;
  document.getElementById('me-kcal').value=m.kcal;
  document.getElementById('master-edit-modal').classList.add('show');
}

function closeMasterEdit(){document.getElementById('master-edit-modal').classList.remove('show');}

function saveMaster(){
  const name=document.getElementById('me-name').value.trim();
  if(!name){alert('食事名を入力してください');return;}
  const item={
    name,
    p:parseFloat(document.getElementById('me-p').value)||0,
    f:parseFloat(document.getElementById('me-f').value)||0,
    c:parseFloat(document.getElementById('me-c').value)||0,
    kcal:parseFloat(document.getElementById('me-kcal').value)||0
  };
  const idx=parseInt(document.getElementById('me-index').value);
  if(idx===-1)state.master.push(item);else state.master[idx]=item;
  save();closeMasterEdit();renderMasterList();
}

function deleteMasterItem(i){
  if(!confirm(`「${state.master[i].name}」を削除しますか？`))return;
  state.master.splice(i,1);
  save();renderMasterList();
}

/* ── 食事選択 ── */
function openFoodSelect(cat){
  state.pendingCat=cat;
  document.getElementById('food-search').value='';
  renderFoodSelect();
  document.getElementById('food-select-modal').classList.add('show');
}
function closeFoodSelect(){document.getElementById('food-select-modal').classList.remove('show');}

function renderFoodSelect(){
  const q=document.getElementById('food-search').value.toLowerCase();
  const list=state.master.filter(m=>m.name.toLowerCase().includes(q));
  const el=document.getElementById('food-select-list');
  if(!list.length){el.innerHTML='<div class="empty">見つかりません<br>マスタから先に登録してください</div>';return;}
  el.innerHTML=list.map((m,i)=>`
    <div class="list-item" onclick="selectFood(${state.master.indexOf(m)})">
      <div>
        <div class="list-name">${m.name}</div>
        <div class="list-sub">P: ${fmt(m.p)}g ／ F: ${fmt(m.f)}g ／ C: ${fmt(m.c)}g ／ ${fmt(m.kcal)}kcal</div>
      </div>
      <span class="list-arrow">›</span>
    </div>`).join('');
}

function selectFood(idx){
  const m=state.master[idx];
  addMealItem(state.pendingCat,{name:m.name,p:m.p,f:m.f,c:m.c,kcal:m.kcal});
  closeFoodSelect();render();
}

/* ── 手入力 ── */
function openManual(cat){
  state.pendingCat=cat;
  document.getElementById('manual-title').textContent='手入力';
  document.getElementById('manual-edit-id').value='';
  ['m-name','m-p','m-f','m-c','m-kcal'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('manual-modal').classList.add('show');
}
function closeManual(){document.getElementById('manual-modal').classList.remove('show');}

function saveManualFood(){
  const name=document.getElementById('m-name').value.trim();
  if(!name){alert('食事名を入力してください');return;}
  const item={
    name,
    p:parseFloat(document.getElementById('m-p').value)||0,
    f:parseFloat(document.getElementById('m-f').value)||0,
    c:parseFloat(document.getElementById('m-c').value)||0,
    kcal:parseFloat(document.getElementById('m-kcal').value)||0
  };
  const editId=document.getElementById('manual-edit-id').value;
  if(editId){
    const[cat,idx]=editId.split('__');
    state.meals[state.mealDate][cat][parseInt(idx)]=item;
  }else{
    addMealItem(state.pendingCat,item);
  }
  save();closeManual();render();
}

function addMealItem(cat,item){
  if(!state.meals[state.mealDate])state.meals[state.mealDate]={};
  if(!state.meals[state.mealDate][cat])state.meals[state.mealDate][cat]=[];
  state.meals[state.mealDate][cat].push(item);
  save();
}

/* ── 目標管理 ── */
function openGoal(){
  const g=state.goal;
  document.getElementById('g-protein').value=g.p;
  document.getElementById('g-fat').value=g.f;
  document.getElementById('g-carb').value=g.c;
  document.getElementById('g-kcal').value=g.kcal;
  document.getElementById('goal-modal').classList.add('show');
}
function closeGoal(){document.getElementById('goal-modal').classList.remove('show');}
function saveGoal(){
  state.goal={
    p:parseFloat(document.getElementById('g-protein').value)||0,
    f:parseFloat(document.getElementById('g-fat').value)||0,
    c:parseFloat(document.getElementById('g-carb').value)||0,
    kcal:parseFloat(document.getElementById('g-kcal').value)||0
  };
  save();closeGoal();
  if(state.currentTab===3)render();
}

/* ── サブメニュー ── */
function showSubMenu(){document.getElementById('sub-nav').classList.add('show');}
function closeSubMenu(){document.getElementById('sub-nav').classList.remove('show');}

/* ── エクスポート/インポート ── */
function exportData(){
  const data=JSON.stringify({weights:state.weights,meals:state.meals,master:state.master,goal:state.goal},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`diet_backup_${todayStr()}.json`;
  a.click();
  closeSubMenu();
}
function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.weights)state.weights=d.weights;
      if(d.meals)state.meals=d.meals;
      if(d.master)state.master=d.master;
      if(d.goal)state.goal=d.goal;
      save();closeSubMenu();render();
      alert('インポートが完了しました！');
    }catch{alert('ファイルの読み込みに失敗しました');}
  };
  reader.readAsText(file);
}

render();
</script>
